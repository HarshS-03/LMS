{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login — FleetFlow</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
        <link rel="stylesheet" href="{% static 'css/premium.css' %}" />
        <style>
            body {
                background: #021024;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                font-family: "Outfit", sans-serif;
            }

            .login-card {
                width: 100%;
                max-width: 420px;
                padding: 40px;
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(20px);
                border-radius: 24px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
                animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
                border: 1px solid rgba(255, 255, 255, 0.2);
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(30px) scale(0.95);
                }

                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            .logo {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 32px;
                justify-content: center;
            }

            .logo svg {
                width: 44px;
                height: 44px;
                color: #2563eb;
                filter: drop-shadow(0 4px 6px rgba(37, 99, 235, 0.2));
            }

            .logo span {
                font-size: 28px;
                font-weight: 800;
                background: linear-gradient(90deg, #021024, #2563eb);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: -0.02em;
            }

            h1 {
                font-size: 24px;
                font-weight: 700;
                color: #021024;
                margin-bottom: 8px;
                text-align: center;
            }

            p.subtitle {
                color: #5483b3;
                font-size: 15px;
                margin-bottom: 32px;
                text-align: center;
            }

            .form-group label {
                display: block;
                font-size: 14px;
                font-weight: 600;
                color: #052659;
                margin-bottom: 10px;
            }

            .form-input {
                width: 100%;
                padding: 14px 18px;
                background: rgba(255, 255, 255, 0.8);
                border: 1px solid rgba(84, 131, 179, 0.2);
                border-radius: 14px;
                font-family: inherit;
                font-size: 15px;
                transition: all 0.3s ease;
            }

            .form-input:focus {
                outline: none;
                border-color: #0d6efd;
                background: #fff;
                box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
                transform: translateY(-1px);
            }

            .login-btn {
                width: 100%;
                padding: 16px;
                background: #0d6efd !important;
                color: white !important;
                border: none !important;
                border-radius: 14px;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.3s;
                margin-top: 12px;
                box-shadow: 0 10px 20px rgba(13, 110, 253, 0.2);
                background-image: none !important;
            }

            .login-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 15px 25px rgba(13, 110, 253, 0.3);
                filter: brightness(1.1);
                background: #0b5ed7 !important;
            }

            .demo-box {
                margin-top: 24px;
                padding: 15px;
                background: rgba(13, 110, 253, 0.05);
                border: 1px dashed rgba(13, 110, 253, 0.3);
                border-radius: 16px;
                text-align: center;
            }

            .demo-box p {
                margin: 0;
                font-size: 13px;
                color: #5483b3;
                margin-bottom: 5px;
            }

            .demo-box code {
                font-family: "Courier New", Courier, monospace;
                font-weight: 700;
                color: #0d6efd;
                background: white;
                padding: 2px 6px;
                border-radius: 4px;
            }

            .forgot {
                margin-top: 20px;
                text-align: center;
            }

            .forgot a {
                font-size: 14px;
                color: #0d6efd;
                text-decoration: none;
                font-weight: 600;
                transition: color 0.2s;
            }

            .forgot a:hover {
                color: #0a58ca;
            }
        </style>
    </head>

    <body>
        <div class="login-card">
            <div class="logo">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect x="1" y="3" width="15" height="13" />
                    <polygon points="16 8 20 8 23 11 23 16 16 16 16 8" />
                    <circle cx="5.5" cy="18.5" r="2.5" />
                    <circle cx="18.5" cy="18.5" r="2.5" />
                </svg>
                <span>FleetFlow</span>
            </div>

            <h1>Welcome Back</h1>
            <p class="subtitle">
                Enter your credentials to access Command Center
            </p>

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input
                        type="text"
                        name="username"
                        class="form-input"
                        placeholder="e.g. admin"
                        required
                    />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-input"
                        placeholder="••••••••"
                        required
                    />
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="demo-box">
                <p>Demo Login</p>
                <p>User: <code>harsh</code> &nbsp; Pass: <code>12345</code></p>
            </div>

            <div class="forgot">
                <a href="{% url 'forgot_password' %}">Forgot your password?</a>
            </div>
        </div>
    </body>
</html>
